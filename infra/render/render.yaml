services:
  - type: web
    name: job-tracker-api
    runtime: docker
    dockerfilePath: backend/services/backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000
  - type: web
    name: job-tracker-web
    runtime: docker
    dockerfilePath: frontend/web/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://job-tracker-api.onrender.com

databases:
  - name: job-tracker-postgres
    databaseName: tracker
    user: tracker
