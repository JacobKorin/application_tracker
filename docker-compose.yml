version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  identity-service:
    build:
      context: .
      dockerfile: backend/services/identity-service/Dockerfile
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: identity-service
      PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  application-service:
    build:
      context: .
      dockerfile: backend/services/application-service/Dockerfile
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: application-service
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis

  notification-service:
    build:
      context: .
      dockerfile: backend/services/notification-service/Dockerfile
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: notification-service
      PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - redis

  api-gateway:
    build:
      context: .
      dockerfile: backend/services/api-gateway/Dockerfile
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: api-gateway
      PORT: 8000
      IDENTITY_SERVICE_URL: http://identity-service:8001
      APPLICATION_SERVICE_URL: http://application-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8003
    ports:
      - "8000:8000"
    depends_on:
      - identity-service
      - application-service
      - notification-service

  web:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
    env_file:
      - .env.example
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres-data:

